---
name: libnvdimm/for-next

# yamllint disable-line rule:truthy
on:
  schedule:
    - cron: '0 6 * * *'  # 10 pm PST (UTC-8)
  workflow_dispatch:

run-name: "libnvdimm/for-next (${{ github.event_name }})"

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      changed:   ${{ steps.changed.outputs.value }}
      sha:       ${{ steps.sha.outputs.value }}
      ndctl_sha: ${{ steps.ndctl_sha.outputs.value }}
    steps:
      - name: fetch kernel HEAD
        id: sha
        run: |
          sha=$(git ls-remote \
            https://git.kernel.org/pub/scm/linux/kernel/git/nvdimm/nvdimm.git \
            refs/heads/libnvdimm-for-next | awk '{print $1}')
          echo "value=$sha" >> "$GITHUB_OUTPUT"

      - name: fetch ndctl HEAD
        id: ndctl_sha
        run: |
          sha=$(git ls-remote \
            https://github.com/pmem/ndctl.git \
            refs/heads/pending | awk '{print $1}')
          echo "value=$sha" >> "$GITHUB_OUTPUT"

      - name: check if already tested
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/.ndctl-tested
          key: tested-nvdimm-for-next-${{ steps.sha.outputs.value }}-${{ steps.ndctl_sha.outputs.value }}
          lookup-only: true

      - name: set changed output
        id: changed
        run: |
          if [[ "${{ steps.cache.outputs.cache-hit }}" == "true" ]]; then
            echo "value=false" >> "$GITHUB_OUTPUT"
            echo "nvdimm/for-next unchanged (kernel: ${{ steps.sha.outputs.value }}, ndctl: ${{ steps.ndctl_sha.outputs.value }}) — skipping"
          else
            echo "value=true" >> "$GITHUB_OUTPUT"
            echo "nvdimm/for-next changed (kernel: ${{ steps.sha.outputs.value }}, ndctl: ${{ steps.ndctl_sha.outputs.value }}) — running"
          fi

  test:
    needs: check
    if: needs.check.outputs.changed == 'true'
    uses: ./.github/workflows/main.yml
    with:
      kernel_repo:   "https://git.kernel.org/pub/scm/linux/kernel/git/nvdimm/nvdimm.git"
      kernel_branch: "libnvdimm-for-next"
      ndctl_repo:    "pmem/ndctl"
      ndctl_branch:  "pending"
      test_suite:    "nvdimm dax"
      timeout_min:   "35"

  mark:
    needs: [check, test]
    if: needs.test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - run: echo "${{ needs.check.outputs.sha }}" > /tmp/.ndctl-tested
      - uses: actions/cache/save@v4
        with:
          path: /tmp/.ndctl-tested
          key: tested-nvdimm-for-next-${{ needs.check.outputs.sha }}-${{ needs.check.outputs.ndctl_sha }}
