# CI base config: applied on top of make defconfig for all test suites
#
# Disables debug and instrumentation options that add runtime overhead
# on TCG QEMU. This is a smoke test — pass/fail with failure location
# is the goal; full debug info is for offline reproduction.
#
# Fragment tested with:
#
#    make defconfig ARCH=x86_64
#    ./scripts/kconfig/merge_config.sh .config $this_file

# No debug info needed for smoke testing; keeps the kernel binary small
CONFIG_DEBUG_INFO_NONE=y

# Disable the debug master switch; most per-subsystem debug options
# depend on this, so one line covers a lot of ground.
# CONFIG_DEBUG_KERNEL is not set

# Explicitly off: these are the high-overhead offenders on TCG QEMU.
# Each adds cost to every kernel allocation, lock, or list operation.
# CONFIG_SLUB_DEBUG is not set
# CONFIG_PROVE_LOCKING is not set
# CONFIG_LOCKDEP is not set
# CONFIG_DEBUG_PREEMPT is not set
# CONFIG_DEBUG_VM is not set
# CONFIG_DEBUG_LIST is not set

# Explicitly off: sanitizers and checkers not needed for smoke testing
# CONFIG_KASAN is not set
# CONFIG_KCSAN is not set
# CONFIG_UBSAN is not set

# Build-time savings: these are large subsystems with no role in
# CXL/NVDIMM/DAX testing. DRM alone cuts compile time nearly in half.
CONFIG_DRM=n
CONFIG_SOUND=n
